<!DOCTYPE html>
<html lang="fr">
<head>
<script>
(function(){
  if(sessionStorage.getItem('filovent_site_auth')!=='ok'){
    const here=location.pathname.split('/').pop()+location.search+location.hash;
    location.replace('index.html?next='+encodeURIComponent(here));
  }
})();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filovent — Itinéraires de Navigation</title>
    <link rel="icon" href="assets/filovent-mark.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
    <style>
        :root {
            --sidebar-width: 290px;
            --navy: #071524;
            --ocean: #0b2642;
            --sky: #e8f6f5;
            --sand: #f7f4ee;
            --wave: #176a9c;
            --coral: #d85d4a;
            --seafoam: #238a73;
            --gold: #c9913a;
            --bg: #f4f8fa;
            --card: #ffffff;
            --border: #d9e4ea;
            --text: #102033;
            --text-2: #394f60;
            --text-3: #7c909b;
            --sidebar-bg: #071524;
            --sidebar-border: rgba(255,255,255,0.09);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            display: flex; min-height: 100vh;
            background: var(--bg);
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text);
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }

        /* ─── SIDEBAR ─────────────────────────────── */
        #sidebar {
            width: var(--sidebar-width);
            background: linear-gradient(180deg,rgba(7,21,36,.98),rgba(11,38,66,.96)),url("assets/filovent-hero-marina.png") center/cover;
            display: flex; flex-direction: column;
            position: fixed; height: 100vh; z-index: 1000;
            box-shadow: 3px 0 20px rgba(13,34,64,0.18);
        }

        .sidebar-header {
            padding: 22px 18px 16px;
            border-bottom: 1px solid var(--sidebar-border);
        }
        .sidebar-header .tagline {
            font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase;
            color: rgba(255,255,255,0.38); margin-top: 8px; font-weight: 500;
            display: flex; align-items: center; gap: 6px;
        }
        .sidebar-header .tagline::before { content: "⚓"; font-size: 0.7rem; }
        .sidebar-body { overflow-y: auto; flex-grow: 1; padding: 6px 0 20px; }

        .search-box { position: relative; padding: 10px 14px 0; }
        .search-box i { position: absolute; left: 26px; top: 21px; color: rgba(255,255,255,0.3); font-size: 0.8rem; }
        .search-box input {
            width: 100%; padding: 8px 54px 8px 32px;
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.07); color: white;
            font-size: 0.83rem; outline: none; transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.3); }
        .search-box input:focus { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.1); }
        .search-kbd {
            position: absolute; right: 22px; top: 18px;
            background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4);
            font-size: 0.6rem; font-family: 'Inter', sans-serif; font-weight: 600;
            padding: 2px 5px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.15);
            letter-spacing: 0.02em; pointer-events: none;
        }

        .accordion-button {
            font-weight: 600; color: rgba(255,255,255,0.75) !important;
            padding: 9px 16px;
            background: transparent !important; box-shadow: none !important;
            font-size: 0.8rem; font-family: 'Inter', sans-serif;
            letter-spacing: 0.01em; transition: color 0.15s, background 0.15s;
        }
        .accordion-button:hover { color: white !important; background: rgba(255,255,255,0.04) !important; }
        .accordion-button::after { filter: brightness(0) invert(1); opacity: 0.3; width: 12px; height: 12px; background-size: 12px; }
        .accordion-button:not(.collapsed) { color: white !important; background: rgba(255,255,255,0.06) !important; }
        .accordion-button:not(.collapsed)::after { opacity: 0.6; }
        .accordion-item { border: none; border-bottom: 1px solid var(--sidebar-border); background: transparent; }
        .accordion-body { padding: 2px 0 8px; }

        .dest-link {
            display: block; padding: 6px 16px 6px 32px;
            color: rgba(255,255,255,0.48); text-decoration: none;
            font-size: 0.8rem; transition: all 0.15s; position: relative;
            border-radius: 0 6px 6px 0; margin-right: 8px;
        }
        .dest-link:hover { color: rgba(255,255,255,0.92); background: rgba(255,255,255,0.06); }
        .dest-link.active {
            color: white; font-weight: 600;
            background: rgba(217,79,61,0.32);
        }
        .dest-link.active::before {
            content: ''; position: absolute; left: 0; top: 0;
            height: 100%; width: 3px; background: var(--coral);
        }

        /* ─── MAIN CONTENT ────── */
        #main-content {
            margin-left: var(--sidebar-width);
            padding: 36px 48px;
            min-height: 100vh;
        }

        .section-panel {
            display: none;
            animation: fadeIn 0.25s ease;
            max-width: 960px;
            margin: 0 auto;
        }
        .section-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* ─── HOME CARDS ─────────────────────────────── */
        .home-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.18s ease;
            position: relative; overflow: hidden;
        }
        .home-card:hover {
            border-color: var(--coral);
            box-shadow: 0 4px 20px rgba(217,79,61,0.12);
            transform: translateY(-2px);
        }
        .home-card-icon { font-size: 1.6rem; margin-bottom: 8px; line-height: 1; }
        .home-card-name {
            font-family: 'Syne', sans-serif;
            font-weight: 800; font-size: 0.95rem;
            color: var(--navy); margin-bottom: 4px;
        }
        .home-card-sub {
            font-size: 0.75rem; color: var(--text-3);
            margin-bottom: 10px; line-height: 1.4;
        }
        .home-card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
        .hct {
            font-size: 0.65rem; font-weight: 700;
            padding: 2px 8px; border-radius: 10px;
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        .hct-blue  { background: #e3eeff; color: #1a4a9a; }
        .hct-green { background: #e3f6ef; color: #1a7a53; }
        .hct-red   { background: #fdf0ee; color: #c0392b; }
        .hct-gold  { background: #fef3cd; color: #9a6700; }

        .tag { display: inline-block; font-size: 0.7rem; font-weight: 600;
            padding: 2px 8px; border-radius: 20px; margin-right: 4px; }
        .tag-blue { background: rgba(42,122,196,0.12); color: var(--wave); }
        .tag-green { background: rgba(26,155,114,0.12); color: var(--seafoam); }
        .tag-red { background: rgba(217,79,61,0.12); color: var(--coral); }
        .tag-gold { background: rgba(201,145,58,0.12); color: var(--gold); }

        /* ─── ITINERARY EXPERIENCE ───────────────────── */
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 34px;
        }
        .zone-card {
            position: relative;
            min-height: 220px;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(7,21,36,0.08);
            background:
                radial-gradient(circle at top left, rgba(42,168,196,0.18), transparent 38%),
                linear-gradient(180deg, #ffffff 0%, #f6fbfc 100%);
            box-shadow: 0 16px 40px rgba(7,21,36,0.1);
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }
        .zone-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 22px 44px rgba(7,21,36,0.16);
            border-color: rgba(23,106,156,0.22);
        }
        .zone-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(23,106,156,0.05), transparent 48%);
            z-index: 1;
        }
        .zone-card-body {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 10px;
            min-height: 220px;
            padding: 20px;
            color: var(--navy);
        }
        .zone-card-kicker {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            width: fit-content;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(23,106,156,0.08);
            border: 1px solid rgba(23,106,156,0.14);
            font-size: 0.68rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .zone-card h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.15rem;
            font-weight: 800;
            line-height: 1.05;
            margin: 0;
        }
        .zone-card p {
            font-size: 0.82rem;
            line-height: 1.5;
            color: var(--text-2);
            margin: 0;
        }
        .zone-card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .zone-card-meta span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 9px;
            border-radius: 999px;
            background: white;
            border: 1px solid var(--border);
            font-size: 0.69rem;
            font-weight: 700;
            color: var(--text-2);
        }
        .quick-picks {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 40px;
        }
        .quick-pick {
            background: linear-gradient(180deg, #ffffff, #f7fbfc);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 18px;
            cursor: pointer;
            transition: all 0.18s ease;
        }
        .quick-pick:hover {
            transform: translateY(-2px);
            border-color: rgba(23,106,156,0.26);
            box-shadow: 0 16px 30px rgba(7,21,36,0.08);
        }
        .quick-pick strong {
            display: block;
            font-family: 'Syne', sans-serif;
            font-size: 0.92rem;
            color: var(--navy);
            margin-bottom: 5px;
        }
        .quick-pick span {
            display: block;
            font-size: 0.77rem;
            color: var(--text-3);
            line-height: 1.45;
        }
        .iti-hero {
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            min-height: 0;
            margin-bottom: 22px;
            background:
                radial-gradient(circle at top left, rgba(42,168,196,0.16), transparent 28%),
                linear-gradient(180deg, #ffffff 0%, #f6fbfc 100%);
            border: 1px solid rgba(7,21,36,0.08);
            box-shadow: 0 18px 48px rgba(7,21,36,0.14);
        }
        .iti-hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(23,106,156,0.05), transparent 52%);
            z-index: 1;
        }
        .iti-hero-body {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 22px;
            min-height: 0;
            padding: 26px;
            color: var(--navy);
        }
        .iti-hero-copy {
            max-width: 620px;
        }
        .iti-kicker {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            background: rgba(23,106,156,0.08);
            border: 1px solid rgba(23,106,156,0.14);
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .iti-hero h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.1rem;
            line-height: 1.02;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .iti-hero p {
            margin: 0;
            max-width: 560px;
            font-size: 0.96rem;
            line-height: 1.65;
            color: var(--text-2);
        }
        .iti-hero-side {
            width: 260px;
            flex-shrink: 0;
            padding: 16px;
            border-radius: 16px;
            background: white;
            border: 1px solid var(--border);
        }
        .iti-hero-side-label {
            font-size: 0.68rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-3);
            font-weight: 800;
            margin-bottom: 8px;
        }
        .iti-hero-side strong {
            display: block;
            font-size: 1.02rem;
            line-height: 1.35;
            color: var(--navy);
        }
        .iti-hero-side p {
            font-size: 0.79rem;
            line-height: 1.55;
            color: var(--text-2);
            margin-top: 8px;
        }
        .route-preview {
            margin-top: 18px;
            display: grid;
            gap: 10px;
        }
        .route-preview-label {
            font-size: 0.68rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-3);
            font-weight: 800;
        }
        .route-preview-track {
            display: flex;
            align-items: center;
            gap: 0;
            flex-wrap: wrap;
        }
        .route-stop {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 11px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.77rem;
            font-weight: 700;
            color: var(--text-2);
            max-width: 220px;
        }
        .route-stop-index {
            width: 22px;
            height: 22px;
            border-radius: 999px;
            display: inline-grid;
            place-items: center;
            background: var(--navy);
            color: white;
            font-size: 0.67rem;
            font-weight: 800;
            flex-shrink: 0;
        }
        .route-link {
            width: 26px;
            height: 2px;
            background: linear-gradient(90deg, rgba(23,106,156,0.45), rgba(23,106,156,0.15));
            margin: 0 6px;
            border-radius: 999px;
        }
        .iti-map-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 18px;
            box-shadow: 0 10px 28px rgba(7,21,36,0.05);
        }
        .iti-map-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }
        .iti-map-head h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            color: var(--navy);
            margin: 0;
        }
        .iti-map-head p {
            margin: 6px 0 0 0;
            font-size: 0.79rem;
            line-height: 1.5;
            color: var(--text-3);
            max-width: 560px;
        }
        .iti-map-button {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #f7fbfc;
            color: var(--navy);
            padding: 8px 11px;
            font-size: 0.75rem;
            font-weight: 800;
            flex-shrink: 0;
        }
        .iti-map-frame {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: #dff4fb;
        }
        .iti-map-frame img {
            display: block;
            width: 100%;
            height: auto;
            cursor: zoom-in;
        }
        .iti-map-caption {
            margin-top: 10px;
            font-size: 0.76rem;
            line-height: 1.5;
            color: var(--text-3);
        }
        .map-lightbox {
            position: fixed;
            inset: 0;
            z-index: 3200;
            display: none;
            padding: 24px;
            background: rgba(7,21,36,0.88);
            backdrop-filter: blur(10px);
        }
        .map-lightbox.open {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 14px;
        }
        .map-lightbox-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
            max-width: 1320px;
            margin: 0 auto;
            color: white;
        }
        .map-lightbox-title {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 800;
        }
        .map-lightbox button {
            border: 1px solid rgba(255,255,255,0.16);
            background: rgba(255,255,255,0.08);
            color: white;
            border-radius: 10px;
            padding: 8px 11px;
            font-size: 0.8rem;
            font-weight: 800;
        }
        .map-lightbox-body {
            overflow: auto;
            display: grid;
            place-items: start center;
        }
        .map-lightbox-body img {
            max-width: min(1320px, 100%);
            height: auto;
            background: white;
            border-radius: 14px;
            box-shadow: 0 24px 70px rgba(0,0,0,0.34);
        }
        .iti-stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }
        .iti-stat {
            background: white;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 18px;
        }
        .iti-stat-label {
            font-size: 0.68rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-3);
            font-weight: 800;
            margin-bottom: 8px;
        }
        .iti-stat-value {
            font-family: 'Syne', sans-serif;
            color: var(--navy);
            font-size: 1.01rem;
            line-height: 1.28;
            font-weight: 800;
        }
        .iti-layout {
            display: grid;
            grid-template-columns: minmax(0, 1.45fr) minmax(280px, 0.95fr);
            gap: 18px;
            align-items: start;
        }
        .iti-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 22px;
            margin-bottom: 16px;
            box-shadow: 0 10px 28px rgba(7,21,36,0.05);
        }
        .iti-card h3 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            color: var(--navy);
            margin-bottom: 14px;
        }
        .iti-chip-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .iti-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.74rem;
            font-weight: 700;
            padding: 7px 11px;
            border-radius: 999px;
            background: #f6fafc;
            border: 1px solid var(--border);
            color: var(--text-2);
        }
        .iti-chip strong {
            color: var(--navy);
            font-weight: 800;
        }
        .escales-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }
        .escale-item {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            padding: 12px 13px;
            border-radius: 12px;
            background: #f7fbfc;
            border: 1px solid var(--border);
        }
        .escale-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-top: 5px;
            flex-shrink: 0;
            background: linear-gradient(180deg, var(--coral), #f29b77);
            box-shadow: 0 0 0 4px rgba(216,93,74,0.08);
        }
        .escale-item span {
            font-size: 0.81rem;
            line-height: 1.48;
            color: var(--text-2);
        }
        .iti-source {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 14px 16px;
            border-radius: 14px;
            background: linear-gradient(180deg, #ffffff, #f6fbfc);
            border: 1px solid var(--border);
        }
        .iti-source p {
            margin: 0;
            font-size: 0.79rem;
            line-height: 1.5;
            color: var(--text-3);
            max-width: 520px;
        }
        .iti-source a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 10px;
            padding: 10px 14px;
            background: var(--navy);
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 800;
        }
        .iti-source a:hover {
            background: var(--ocean);
        }
        .detail-toggle {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 0;
            margin: 0;
            background: none;
            border: 0;
            text-align: left;
            color: inherit;
        }
        .detail-toggle .toggle-copy strong {
            display: block;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            color: var(--navy);
        }
        .detail-toggle .toggle-copy span {
            display: block;
            font-size: 0.77rem;
            color: var(--text-3);
            margin-top: 5px;
            line-height: 1.45;
        }
        .detail-toggle i {
            color: var(--wave);
            font-size: 0.95rem;
            transition: transform 0.16s ease;
        }
        .detail-toggle[aria-expanded="true"] i {
            transform: rotate(180deg);
        }
        .detail-body {
            display: none;
            margin-top: 16px;
        }
        .detail-body.open {

<script>
const ZONE_META = [
    { key: 'Méditerranée', icon: '🌊', color: 'var(--coral)', image: 'assets/greenbook-maps/grece.jpg', intro: 'Les routes les plus demandées pour l’été : Corse, Grèce, Croatie, Baléares et côte italienne.' },
    { key: 'Atlantique', icon: '🌬️', color: 'var(--wave)', image: 'assets/greenbook-maps/bretagne.jpg', intro: 'Des navigations plus sportives, plus marquées par la marée et le rythme océanique.' },
    { key: 'Caraïbes', icon: '🏝️', color: 'var(--seafoam)', image: 'assets/greenbook-maps/antilles.jpg', intro: 'Eaux chaudes, mouillages carte postale et formats d’une à deux semaines pour vendre du rêve vite.' },
    { key: 'Océan Indien', icon: '🐚', color: 'var(--gold)', image: 'assets/greenbook-maps/seychelles.jpg', intro: 'Des itinéraires premium, snorkeling et ambiance lagon, idéals pour lune de miel et beaux voyages.' },
    { key: 'Pacifique', icon: '🌴', color: 'var(--seafoam)', image: 'assets/greenbook-maps/polynesie.jpg', intro: 'Grand voyage, navigation bout du monde et escales qui doivent immédiatement faire rêver le client.' },
    { key: 'Fluvial', icon: '🚢', color: 'var(--gold)', image: 'assets/greenbook-maps/canal-midi.jpg', intro: 'Parcours sans pression, souvent sans permis, parfaits pour les profils famille et découverte douce.' },
    { key: 'Fleuve', icon: '🛶', color: 'var(--gold)', image: 'assets/greenbook-maps/france-fluviale.jpg', intro: 'Croisières culturelles et immersives, vendues autant pour le voyage que pour le bateau.' },
    { key: 'Expédition', icon: '🧊', color: 'var(--wave)', image: 'assets/filovent-hero-marina.png', intro: 'Voyages de caractère, plus narratifs, qui se vendent sur l’expérience globale.' }
];

const ZONE_LOOKUP = Object.fromEntries(ZONE_META.map(zone => [zone.key, zone]));
const ITI_BY_ZONE = ZONE_META.map(zone => ({
    ...zone,
    items: ITI.filter(it => it.zone === zone.key)
})).filter(zone => zone.items.length);

function getZoneMeta(zoneName) {
    return ZONE_LOOKUP[zoneName] || {
        key: zoneName,
        icon: '🧭',
        color: 'var(--wave)',
        image: 'assets/filovent-hero-marina.png',
        intro: 'Sélection d’itinéraires Filovent.'
    };
}

function getHeroImage(it) {
    const title = `${it.title} ${it.depart} ${it.zone}`.toLowerCase();
    if (title.includes('corse')) return 'assets/greenbook-maps/corse.jpg';
    if (title.includes('sardaigne')) return 'assets/greenbook-maps/sardaigne.jpg';
    if (title.includes('croatie') || title.includes('kornati') || title.includes('izola')) return 'assets/greenbook-maps/croatie.jpg';
    if (title.includes('cyclades') || title.includes('ioniennes') || title.includes('sporades') || title.includes('dodécanèse') || title.includes('grèce') || title.includes('kos') || title.includes('lefkas')) return 'assets/greenbook-maps/grece.jpg';
    if (title.includes('baléares') || title.includes('ibiza') || title.includes('formentera')) return 'assets/greenbook-maps/baleares.jpg';
    if (title.includes('bahamas')) return 'assets/greenbook-maps/bahamas.jpg';
    if (title.includes('martinique') || title.includes('grenadines') || title.includes('guadeloupe') || title.includes('saint-martin')) return 'assets/greenbook-maps/antilles.jpg';
    if (title.includes('seychelles')) return 'assets/greenbook-maps/seychelles.jpg';
    if (title.includes('canal du midi') || title.includes('cassafières')) return 'assets/greenbook-maps/canal-midi.jpg';
    if (title.includes('fluvial')) return 'assets/greenbook-maps/france-fluviale.jpg';
    if (title.includes('turquie')) return 'assets/greenbook-maps/turquie.jpg';
    if (title.includes('bretagne') || title.includes('trinité') || title.includes('quiberon')) return 'assets/greenbook-maps/bretagne.jpg';
    if (title.includes('nouvelle calédonie')) return 'assets/greenbook-maps/polynesie.jpg';
    return getZoneMeta(it.zone).image;
}

function splitEscales(escales) {
    return escales.split(',').map(item => item.trim()).filter(Boolean);
}

function pickHighlights(it) {
    return splitEscales(it.escales).slice(0, 4);
}

function stripTags(text) {
    return text.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
}

function buildTimeline(it) {
    const cleaned = it.jours
        .replace(/<em>/g, '')
        .replace(/<\/em>/g, '')
        .split(/·/g)
        .map(item => item.trim())
        .filter(Boolean);

    return cleaned.map((step, index) => {
        const labelMatch = step.match(/^(J\d+|Sem\.\s*\d+)/i);
        const label = labelMatch ? labelMatch[0] : `Étape ${index + 1}`;
        const body = step
            .replace(/<strong>|<\/strong>/g, '')
            .replace(label, '')
            .trim()
            .replace(/^[-:–]\s*/, '');

        return { label, body: body || stripTags(step) };
    }).slice(0, 10);
}

function buildTips(it) {
    return it.tips.split('·').map(item => stripTags(item)).filter(Boolean).slice(0, 6);
}

function buildComfortLabel(distance, duree) {
    const text = `${distance} ${duree}`.toLowerCase();
    if (text.includes('sportif') || text.includes('240 milles') || text.includes('3 semaines') || text.includes('2 semaines')) return 'Parcours dense';
    if (text.includes('sans permis') || text.includes('2-3h/jour') || text.includes('3-4h/jour')) return 'Rythme facile';
    return 'Rythme équilibré';
}

function buildSalesAngle(it) {
    const title = `${it.title} ${it.zone}`.toLowerCase();
    if (title.includes('grenadines') || title.includes('seychelles') || title.includes('bahamas')) return 'À vendre sur la beauté des mouillages et l’effet wow immédiat.';
    if (title.includes('canal du midi') || title.includes('fluvial')) return 'À vendre sur la simplicité, la déconnexion et l’accessibilité.';
    if (title.includes('norvège') || title.includes('nil') || title.includes('mékong')) return 'À vendre comme expérience de voyage complète, pas seulement comme navigation.';
    if (title.includes('cyclades') || title.includes('corse') || title.includes('croatie') || title.includes('baléares')) return 'À vendre sur l’équilibre entre belles escales, vie à bord et logistique simple.';
    return 'À vendre sur le décor, la variété des escales et la promesse d’un vrai voyage.';
}

                        <h3>Escales à mettre en avant</h3>
                        <div class="escales-grid">
                            ${highlights.map(stop => `
                                <div class="escale-item">
                                    <div class="escale-dot"></div>
                                    <span>${stop}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="iti-card">
                        <button type="button" class="detail-toggle" onclick="toggleDetail('${it.id}', this)" aria-expanded="false">
                            <div class="toggle-copy">
                                <strong>Déroulé détaillé de l’itinéraire</strong>
                                <span>Ouvre la séquence jour par jour quand tu as besoin d’entrer plus loin dans le conseil.</span>
                            </div>
                            <i class="bi bi-chevron-down"></i>
                        </button>
                        <div class="detail-body" id="detail-${it.id}">
                            <div class="timeline">
                                ${timeline.map(step => `
                                    <div class="timeline-step">
                                        <strong>${step.label}</strong>
                                        <div>${step.body}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>

                <div>
                    <div class="iti-card">
                        <h3>Conseils de vente</h3>
                        <div class="tips-list">
                            ${tips.map(tip => `
                                <div class="tip-item">
                                    <i class="bi bi-check2-circle"></i>
                                    <span>${tip}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="iti-card">
                        <h3>Fiche repère</h3>
                        <div class="iti-notes">
                            <div class="iti-note">
                                <div class="iti-note-label">Promesse client</div>
                                <div class="iti-note-value">${buildSalesAngle(it)}</div>
                            </div>
                            <div class="iti-note">
                                <div class="iti-note-label">Escales complètes</div>
                                <div class="iti-note-value">${stops.join(' · ')}</div>
                            </div>
                            <div class="iti-note">
                                <div class="iti-note-label">Lecture source</div>
                                <div class="iti-note-value">Retour d’expérience Filovent compilé depuis le magazine, utile pour nourrir un échange commercial plus incarné.</div>
                            </div>
                        </div>
                    </div>

                    <div class="iti-source">
                        <p>Tu peux ouvrir la version éditoriale complète pour récupérer plus de détails, un ton plus narratif ou vérifier une escale précise.</p>
                        <a href="${it.url}" target="_blank"><i class="bi bi-box-arrow-up-right"></i> Ouvrir l’article</a>
                    </div>
                </div>
            </div>
        `;
        mainContent.appendChild(panel);
    });
}

renderSidebar();
renderHome();
renderPanels();
</script>

</div><!-- /#main-content -->

<div id="mapLightbox" class="map-lightbox" aria-hidden="true">
    <div class="map-lightbox-bar">
        <div>
            <div class="map-lightbox-title" id="mapLightboxTitle">Carte d’itinéraire</div>
            <div style="font-size:.78rem;color:rgba(255,255,255,.6);font-weight:700;margin-top:3px;">Source Filovent Magazine</div>
        </div>
        <button type="button" onclick="closeMapLightbox()"><i class="bi bi-x-lg"></i> Fermer</button>
    </div>
    <div class="map-lightbox-body" onclick="closeMapLightbox()">
        <img id="mapLightboxImg" src="" alt="">
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ─── NAVIGATION ────────────────────────────────────────
function showSection(id) {
    document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.dest-link').forEach(l => l.classList.remove('active'));

    const panel = document.getElementById('panel-' + id);
    if (panel) panel.classList.add('active');

    const link = document.querySelector('[data-section="' + id + '"]');
    if (link) {
        link.classList.add('active');
        const acc = link.closest('.accordion-collapse');
        if (acc && !acc.classList.contains('show')) {
            new bootstrap.Collapse(acc, { toggle: false }).show();
        }
    }

    window.scrollTo(0, 0);
}

function toggleDetail(id, button) {
    const detail = document.getElementById('detail-' + id);
    if (!detail) return;
    const isOpen = detail.classList.contains('open');
    detail.classList.toggle('open', !isOpen);
    button.setAttribute('aria-expanded', String(!isOpen));
}

function openMapLightbox(id) {
    const map = ITI_MAPS[id];
    if (!map) return;
    const itinerary = ITI.find(item => item.id === id);
    const modal = document.getElementById('mapLightbox');
    const modalImg = document.getElementById('mapLightboxImg');
    const title = document.getElementById('mapLightboxTitle');
    modalImg.src = map.src;
    modalImg.alt = itinerary ? `Carte d’itinéraire ${itinerary.title}` : 'Carte d’itinéraire';
    title.textContent = itinerary ? `Carte · ${itinerary.title}` : 'Carte d’itinéraire';
    modal.classList.add('open');
    modal.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
}

function closeMapLightbox() {
    const modal = document.getElementById('mapLightbox');
    modal.classList.remove('open');
    modal.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
}

// Home link
document.getElementById('home-link').addEventListener('click', function(e) {
    e.preventDefault();
    showSection('home');
});

document.querySelectorAll('.dest-link').forEach(link => {
    link.addEventListener('click', e => {
        e.preventDefault();
        showSection(link.dataset.section);
    });
});

// ─── SEARCH ────────────────────────────────────────────
const searchData = [];
ITI.forEach(it => {
    searchData.push({ title: it.title, section: it.id, context: it.zone + ' · ' + it.depart });
    searchData.push({ title: it.depart, section: it.id, context: it.title });
    searchData.push({ title: it.zone, section: it.id, context: it.title });
    it.escales.split(', ').forEach(e => {
        if (e.length > 3) searchData.push({ title: e.trim(), section: it.id, context: it.title });
    });
});

const fuse = new Fuse(searchData, { keys: ['title','context'], threshold: 0.35, minMatchCharLength: 2 });

const searchInput = document.getElementById('searchInput');
const resultsBox = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim();
    if (q.length < 2) { resultsBox.style.display = 'none'; return; }
    const results = fuse.search(q).slice(0, 8);
    if (!results.length) {
        resultsBox.innerHTML = '<div id="search-results-empty">Aucun résultat</div>';
    } else {
        resultsBox.innerHTML = results.map(r =>
            `<div class="search-result-item" onclick="showSection('${r.item.section}');resultsBox.style.display='none';searchInput.value='';">
                <div class="res-title">${r.item.title}</div>
                <div class="res-context">${r.item.context}</div>
            </div>`
        ).join('');
    }
    resultsBox.style.display = 'block';
});

document.addEventListener('click', e => {
    if (!e.target.closest('#sidebar')) resultsBox.style.display = 'none';
});

document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        searchInput.focus();
    }
    if (e.key === 'Escape') {
        closeMapLightbox();
        resultsBox.style.display = 'none';
        searchInput.value = '';
        searchInput.blur();
    }
});
</script>
</body>
</html>
